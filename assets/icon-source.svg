<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep navy left → deep crimson right -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="50%"  stop-color="#1a0f1f"/>
      <stop offset="100%" stop-color="#6b0f0f"/>
    </linearGradient>

    <!-- White cross glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Bolt shadow -->
    <filter id="boltShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.6)"/>
    </filter>

    <!-- Rounded rect clip for icon shape -->
    <clipPath id="iconShape">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- ── Rounded background ─────────────────────────────────────────── -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- ── Subtle radial glow center ─────────────────────────────────── -->
  <radialGradient id="centerGlow" cx="55%" cy="45%" r="55%">
    <stop offset="0%"   stop-color="#c62828" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#centerGlow)"/>

  <!-- ── White Medical Cross ───────────────────────────────────────── -->
  <!--  Cross: horizontal bar + vertical bar centered at 512,512        -->
  <g clip-path="url(#iconShape)" filter="url(#glow)">
    <!-- Vertical arm -->
    <rect x="412" y="192" width="200" height="640" rx="20" ry="20" fill="white" opacity="0.97"/>
    <!-- Horizontal arm -->
    <rect x="192" y="412" width="640" height="200" rx="20" ry="20" fill="white" opacity="0.97"/>
  </g>

  <!-- ── Lightning bolt overlay ────────────────────────────────────── -->
  <!--  Bold bolt from upper-center to lower-center, cutting the cross  -->
  <g filter="url(#boltShadow)">
    <polygon
      points="570,192  430,530  530,530  454,832  650,440  540,440"
      fill="#c62828"
      stroke="#8b0000"
      stroke-width="6"
      stroke-linejoin="round"
    />
    <!-- Inner highlight on bolt -->
    <polygon
      points="558,220  448,510  528,510  466,780  624,460  536,460"
      fill="#e53935"
      opacity="0.6"
    />
  </g>

  <!-- ── Bottom label (optional — remove for iOS App Store icon) ───── -->
  <!--
  <text x="512" y="950"
    text-anchor="middle"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="64" font-weight="900"
    fill="white" opacity="0.7"
    letter-spacing="6">
    MS DIVERSION
  </text>
  -->
</svg>
